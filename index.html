<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM @BEERGARDEN 🍺</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:rgba(29,158,117,0.15);
  --red:#E24B4A;--red-dark:#A32D2D;--red-light:rgba(226,75,74,0.15);
  --amber:#EF9F27;--amber-light:rgba(239,159,39,0.15);
  --blue:#4A90D9;--blue-light:rgba(74,144,217,0.15);
  --gold:#c9a227;--silver:#8a9aaa;--bronze:#a0633a;
  --bg:#0e1117;--bg2:#181e27;--bg3:#1e2636;--bg4:#242f42;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f4f8;--text2:#8b97a8;--text3:#4a5568;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px}

/* HEADER */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem 1.25rem 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px}
.logo span{color:var(--green)}
.sync-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s}
.dot.live{background:var(--green)}
.tabs{display:flex}
.tab{flex:1;padding:9px 4px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;text-align:center;transition:color .15s,border-color .15s;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--green)}
.tab-tv{display:none}
@media(min-width:900px){.tab-tv{display:block}}

/* MAIN */
.main{padding:1.25rem;max-width:540px;margin:0 auto}
.section{display:none}.section.active{display:block}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:1rem}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1rem 1.1rem;margin-bottom:12px}
.card-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px}
input,textarea,select{width:100%;padding:10px 12px;font-size:15px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:10px;background:var(--bg3);color:var(--text);outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--green)}
textarea{resize:vertical;min-height:60px;line-height:1.5}
select option{background:var(--bg3)}
.field{margin-bottom:12px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* BUTTONS */
.btn{padding:10px 16px;border:1px solid var(--border2);border-radius:10px;background:var(--bg3);color:var(--text);cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;transition:background .15s}
.btn:hover{background:var(--bg4)}
.btn-primary{background:var(--green);color:#fff;border-color:var(--green-dark)}
.btn-primary:hover{background:var(--green-dark)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red-dark)}
.btn-red:hover{background:var(--red-dark)}
.btn-full{width:100%}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px}

/* BET CATALOG */
.cat-section{margin-bottom:16px}
.cat-header{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);padding:6px 0;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.bet-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s,background .15s;gap:10px}
.bet-item:hover{border-color:var(--green);background:var(--bg3)}
.bet-item.already-placed{border-color:var(--green)}
.bet-item-text{flex:1;font-size:14px;line-height:1.4}
.bet-item-odds{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.odds-badge{background:var(--amber-light);color:var(--amber);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap}
.sips-hint{font-size:11px;color:var(--text3);text-align:right}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-open{background:var(--green-light);color:#4ecfa0}

/* AVATARS */
.avatar{width:52px;height:62px;border-radius:50% 50% 45% 45% / 55% 55% 45% 45%;border:2px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;overflow:hidden;flex-shrink:0;color:var(--text)}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-upload{position:relative;cursor:pointer}
.avatar-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.avatar-edit{position:absolute;bottom:0;right:0;background:var(--green);color:#fff;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}

/* PLAYER ROWS */
.player-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.player-row:last-child{border-bottom:none}

/* BET CARDS */
.bet-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1rem 1.1rem;margin-bottom:10px}
.sip-badge{background:var(--amber-light);color:var(--amber);padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600}

/* SCORE */
.score-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px}
.score-row{display:flex;align-items:center;padding:12px 1.1rem;border-bottom:1px solid var(--border)}
.score-row:last-child{border-bottom:none}

/* TIPPING */
.hub-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.hub-btn{padding:12px 8px;border:1px solid var(--border2);border-radius:10px;background:var(--bg3);color:var(--text);cursor:pointer;font-size:15px;font-weight:600;text-align:center;transition:all .15s}
.hub-btn.selected{border-color:var(--green);background:var(--green-light);color:#4ecfa0}
.score-inp-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:12px}
.score-inp-row input{width:64px;text-align:center;font-size:22px;font-weight:600;padding:10px 6px}
.bonus-opt{padding:7px 14px;border:1px solid var(--border2);border-radius:20px;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s;display:inline-block;margin:3px}
.bonus-opt.selected{border-color:var(--blue);background:var(--blue-light);color:#79b4f0}

/* LIVE BOX */
.live-box{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:1rem;margin-bottom:12px;text-align:center}
.live-score-big{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;line-height:1}
.live-clock{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--green);margin:2px 0}
.live-badge{display:inline-block;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* TV EVENT BANNER */
#tv-event-banner{position:fixed;top:0;left:0;right:0;z-index:300;padding:1.25rem 2rem;display:none;align-items:center;justify-content:center;gap:20px;animation:slideDown .35s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.tv-event-feed{margin-top:10px;display:flex;flex-direction:column;gap:4px}

/* HISTORY */
.history-item{font-size:13px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.history-item:last-child{border-bottom:none}
.empty{color:var(--text3);font-size:15px;text-align:center;padding:2.5rem 0}

/* CELEBRATION OVERLAY */
#celebration{position:fixed;inset:0;z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);pointer-events:none}
#celebration.show{display:flex;animation:celebFadeIn .3s ease}
@keyframes celebFadeIn{from{opacity:0}to{opacity:1}}
.celeb-emoji{font-size:100px;animation:celebBounce .6s ease infinite alternate;line-height:1}
@keyframes celebBounce{from{transform:scale(1) rotate(-5deg)}to{transform:scale(1.2) rotate(5deg)}}
.celeb-title{font-family:'Bebas Neue',sans-serif;font-size:80px;letter-spacing:4px;color:#fff;text-shadow:0 0 40px var(--green);margin:12px 0 8px;line-height:1}
.celeb-desc{font-size:22px;color:#fff;opacity:.85;text-align:center;max-width:600px;padding:0 2rem}
.celeb-placer{font-size:18px;color:var(--amber);margin-top:10px;font-weight:600}
.celeb-payout{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--green);letter-spacing:2px;margin-top:8px}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:12px 22px;border-radius:30px;font-size:14px;z-index:999;max-width:90vw;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}

/* ═══════════════════ TV VIEW ═══════════════════ */
#tab-tv{display:none}
#tab-tv.active{display:grid;grid-template-columns:1fr 1fr 320px;grid-template-rows:auto 1fr;gap:14px;max-width:none;margin:0 auto;padding:1.25rem}
@media(min-width:900px){#tab-tv.active{display:grid}}
.tv-col-scroll{overflow-y:auto;max-height:calc(100vh - 100px)}
/* Compact TV podiums */
.podium-sm{padding:.6rem .5rem 0}
.podium-sm .podium-headline{font-size:14px;margin-bottom:.5rem}
.podium-sm .spot-1 .mii-face{width:48px;height:58px;font-size:20px}
.podium-sm .spot-2 .mii-face,.podium-sm .spot-3 .mii-face{width:38px;height:46px;font-size:16px}
.podium-sm .spot-1 .mii-body{width:38px;height:44px}
.podium-sm .spot-2 .mii-body,.podium-sm .spot-3 .mii-body{width:30px;height:36px}
.podium-sm .spot-1 .mii-leg{width:10px;height:18px}
.podium-sm .spot-2 .mii-leg,.podium-sm .spot-3 .mii-leg{width:8px;height:14px}
.podium-sm .mii-arms-l{left:-10px;width:13px;height:9px}
.podium-sm .mii-arms-r{right:-10px;width:13px;height:9px}
.podium-sm .spot-1 .podium-block{height:60px}
.podium-sm .spot-2 .podium-block{height:44px}
.podium-sm .spot-3 .podium-block{height:32px}
.podium-sm .mii-crown{font-size:12px;top:-12px}
.podium-sm .mii-label{font-size:11px}
.podium-sm .mii-pts{font-size:10px}
.podium-sm .podium-num{font-size:20px}
.tv-bet-player{margin-bottom:14px}
.tv-bet-player-name{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.tv-bet-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:6px}
.tv-bet-row.won{border-color:var(--green);background:var(--green-light)}
.tv-bet-row.lost{opacity:.4}

.tv-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.25rem;overflow:hidden}
.tv-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text2);margin-bottom:1rem}

/* PODIUM */
.podium-wrap{grid-column:1/3;display:flex;flex-direction:column;align-items:center;background:linear-gradient(180deg,#0e1117 0%,#181e27 100%);border-radius:16px;padding:2rem 1rem 0;overflow:hidden;border:1px solid var(--border)}
.podium-headline{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;margin-bottom:1.5rem}
.podium-headline span{color:var(--green)}
.podium-stage{display:flex;align-items:flex-end;justify-content:center;gap:0;width:100%;max-width:700px}
.podium-spot{display:flex;flex-direction:column;align-items:center;flex:1}

/* MII FIGURE */
.mii-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:8px}
.mii-head-wrap{position:relative}
.mii-crown{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:20px;z-index:3}
.mii-face{border-radius:50% 50% 45% 45% / 58% 58% 42% 42%;overflow:hidden;border:3px solid #fff;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text);position:relative;z-index:2}
.mii-neck{width:14px;height:10px;background:#c8956c;margin:0 auto}
.mii-body{border-radius:22px 22px 8px 8px;position:relative;display:flex;align-items:flex-start;justify-content:center;padding-top:8px;margin:0 auto}
.mii-arms-l,.mii-arms-r{position:absolute;top:10px;width:18px;height:13px;border-radius:7px}
.mii-arms-l{left:-15px}
.mii-arms-r{right:-15px}
.mii-legs{display:flex;gap:5px;justify-content:center}
.mii-leg{border-radius:0 0 7px 7px}

/* SPOT SIZES */
.spot-1 .mii-face{width:78px;height:92px;font-size:34px;border-color:gold;border-width:3px}
.spot-2 .mii-face,.spot-3 .mii-face{width:62px;height:74px;font-size:26px}
.spot-1 .mii-body{width:62px;height:72px}
.spot-2 .mii-body,.spot-3 .mii-body{width:52px;height:62px}
.spot-1 .mii-leg{width:17px;height:32px}
.spot-2 .mii-leg,.spot-3 .mii-leg{width:14px;height:26px}

/* SPOT COLORS */
.spot-1 .mii-body{background:#1D9E75}.spot-1 .mii-arms-l,.spot-1 .mii-arms-r{background:#0F6E56}.spot-1 .mii-leg{background:#063d2e}
.spot-2 .mii-body{background:#4A90D9}.spot-2 .mii-arms-l,.spot-2 .mii-arms-r{background:#3070b5}.spot-2 .mii-leg{background:#1a4a80}
.spot-3 .mii-body{background:#9b59b6}.spot-3 .mii-arms-l,.spot-3 .mii-arms-r{background:#7d3f9a}.spot-3 .mii-leg{background:#5a2d70}

/* PODIUM BLOCKS */
.podium-block{width:100%;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;padding-bottom:12px}
.spot-1 .podium-block{background:var(--gold);height:140px}
.spot-2 .podium-block{background:var(--silver);height:105px}
.spot-3 .podium-block{background:var(--bronze);height:80px}
.podium-num{font-family:'Bebas Neue',sans-serif;font-size:32px}
.spot-1 .podium-num{color:#7a5c00}
.spot-2 .podium-num{color:#3a4a55}
.spot-3 .podium-num{color:#5a2e10}
.mii-label{font-size:13px;font-weight:600;text-align:center;margin-top:6px;max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mii-pts{font-size:12px;color:var(--text2);text-align:center}
.spot-1 .mii-pts{color:var(--amber);font-weight:600;font-size:13px}

/* MII ANIMATIONS */
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
@keyframes celebrate{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-8px) rotate(-5deg)}75%{transform:translateY(-4px) rotate(5deg)}}
.spot-1 .mii-wrap{animation:celebrate 1.2s ease-in-out infinite}
.spot-2 .mii-wrap{animation:bounce 1.6s ease-in-out infinite}
.spot-3 .mii-wrap{animation:sway 2s ease-in-out infinite}

/* TV SCOREBOARD */
.tv-score-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.tv-score-row:last-child{border-bottom:none}
.tv-rank{font-size:20px;width:30px;text-align:center}
.tv-name{font-size:16px;font-weight:500;flex:1;margin-left:10px}
.tv-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px}
.tv-val.pos{color:var(--green)}
.tv-val.neg{color:var(--red)}

/* TV LIVE */
.tv-live-score{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:3px;text-align:center;line-height:1}
.tv-live-teams{display:flex;justify-content:space-between;font-size:15px;color:var(--text2);margin-top:4px}

/* PODIUM BREAKDOWN MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:1.5rem;max-width:420px;width:100%;position:relative}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1}
.breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.breakdown-row:last-child{border-bottom:none}
.breakdown-label{font-size:14px;color:var(--text2)}
.breakdown-pts{font-size:15px;font-weight:600}
.breakdown-pts.hit{color:#4ecfa0}
.breakdown-pts.miss{color:var(--red)}
.breakdown-pts.pending{color:var(--amber)}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">VM <span>@BEERGARDEN</span> 🍺</div>
    <div class="sync-row">
      <span class="dot" id="sync-dot"></span>
      <span id="sync-label">Kobler til...</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('spillere')">Min oversikt</button>
    <button class="tab" onclick="showTab('tipping')">🏆 Tippekonk</button>
    <button class="tab" onclick="showTab('betting')">🃏 Bookern</button>
    <button class="tab tab-tv" onclick="showTab('tv')">📺 Storskjerm</button>
  </div>
</header>

<div class="main" id="main-wrap">

  <!-- ===== MIN OVERSIKT / SPILLERE ===== -->
  <div class="section active" id="tab-spillere">
    <div class="section-title" id="spillere-title">Min oversikt</div>
    <div id="match-admin-panel"></div>
    <div class="card" id="add-player-card">
      <div class="field"><label>Navn</label><input type="text" id="player-name" placeholder="f.eks. Anders" onkeydown="if(event.key==='Enter')addPlayer()"></div>
      <button class="btn btn-primary btn-full" onclick="addPlayer()">Legg til spiller</button>
    </div>
    <div id="player-list"></div>
    <div id="reset-wrap"></div>
  </div>

  <!-- ===== TIPPING ===== -->
  <div class="section" id="tab-tipping">
    <div class="section-title">Tippekonk</div>
    <div id="live-score-box"></div>
    <div class="card">
      <div class="field"><label>Velg kamp</label>
        <div id="tip-match-buttons" class="hub-row"></div>
      </div>
      <div class="field" id="tip-player-field"><label id="tip-player-label">Hvem tipper?</label>
        <select id="tip-player-select" onchange="renderTipForm()"><option value="">Velg spiller...</option></select>
      </div>
    </div>
    <div id="tip-form"></div>
  </div>

  <!-- ===== BETTING ===== -->
  <div class="section" id="tab-betting">
    <div class="section-title">Bookern</div>

    <!-- Step 1: pick match -->
    <div class="card">
      <div class="field"><label>Velg kamp</label>
        <div id="bet-match-buttons" class="hub-row"></div>
      </div>
    </div>

    <!-- Bet catalog -->
    <div id="bet-catalog"></div>

    <!-- Bet placement modal (inline) -->
    <div id="bet-place-panel" style="display:none">
      <div class="card" style="border-color:var(--green)">
        <div class="card-label">Legg inn bet</div>
        <div id="bet-place-desc" style="font-size:16px;font-weight:500;margin-bottom:4px"></div>
        <div id="bet-place-odds" style="font-size:13px;color:var(--amber);margin-bottom:14px"></div>
        <div class="field"><label>Hvem vedder?</label>
          <select id="bet-placer-sel" onchange="updateBudgetDisplay()"><option value="">Velg spiller...</option></select>
          <div id="budget-display" style="font-size:12px;color:var(--text2);margin-top:6px"></div>
        </div>
        <div class="field"><label>Innsats (maks 10 tokens)</label>
          <input type="number" id="bet-stake" min="1" max="10" value="2">
        </div>
        <div id="bet-payout-preview" style="font-size:13px;color:var(--text2);margin-bottom:12px"></div>
        <div style="display:flex;gap:8px">

window.uploadAvatar=function(id,input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const SIZE=256;
      canvas.width=SIZE; canvas.height=SIZE;
      const ctx=canvas.getContext('2d');

      // Crop to square from center
      const s=Math.min(img.width,img.height);
      const sx=(img.width-s)/2;
      const sy=(img.height-s)/2;

      // Mii-style distortion: stretch width ~115%, squish top, enlarge eyes zone
      ctx.save();
      // Draw base square crop
      ctx.drawImage(img, sx, sy, s, s, 0, 0, SIZE, SIZE);
      ctx.restore();

      // Apply a subtle horizontal stretch using a second canvas pass
      const canvas2=document.createElement('canvas');
      canvas2.width=SIZE; canvas2.height=SIZE;
      const ctx2=canvas2.getContext('2d');

      // Clip to circle for the avatar
      ctx2.beginPath();
      ctx2.arc(SIZE/2, SIZE/2, SIZE/2, 0, Math.PI*2);
      ctx2.clip();

      // Mii-style: wide face, big forehead, squished chin
      ctx2.transform(1.28, 0, 0, 0.88, -SIZE*0.14, SIZE*0.06);
      ctx2.drawImage(canvas, 0, 0, SIZE, SIZE);

      const result=canvas2.toDataURL('image/jpeg', 0.82);
      update(ref(db,'players/'+id),{avatar:result});
      showToast('Avatar oppdatert! 📸');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};

async function sofaFetch(url){
  // Try direct first, fall back to CORS proxy
  try{
    const r=await fetch(url,{headers:{'Accept':'application/json'}});
    if(r.ok)return r;
  }catch{}
  try{
    const r=await fetch('https://corsproxy.io/?'+encodeURIComponent(url));
    if(r.ok)return r;
  }catch{}
  return null;
}

async function fetchSofaScore(sofaId){
  if(!sofaId)return null;
  try{
    const evRes=await sofaFetch(`https://api.sofascore.com/api/v1/event/${sofaId}`);
    if(!evRes){ document.getElementById('sync-label').textContent='SofaScore: ingen data'; return null; }
    const {event:ev}=await evRes.json();
    const incRes=await sofaFetch(`https://api.sofascore.com/api/v1/event/${sofaId}/incidents`);
    const {incidents=[]}=incRes?await incRes.json():{};
    const SC={0:'NS',6:'1H',7:'HT',8:'2H',9:'ET',10:'P',100:'FT',110:'FT',120:'FT'};
    const status=SC[ev.status?.code]||'NS';
    const events=incidents.map(inc=>{
      if(inc.incidentType==='goal')return{type:'Goal',detail:inc.incidentClass==='penalty'?'Penalty':inc.incidentClass==='own-goal'?'Own Goal':'Normal Goal',team:{name:inc.team?.name||''},player:{name:inc.player?.name||''},assist:inc.assist1?{name:inc.assist1.name}:null,time:{elapsed:inc.time||0}};
      if(inc.incidentType==='card')return{type:'Card',detail:(inc.incidentClass==='red'||inc.incidentClass==='yellow-red')?'Red Card':'Yellow Card',team:{name:inc.team?.name||''},player:{name:inc.player?.name||''},time:{elapsed:inc.time||0}};
      if(inc.incidentType==='substitution')return{type:'subst',player:{name:inc.playerOut?.name||''},assist:inc.playerIn?{name:inc.playerIn.name}:null,time:{elapsed:inc.time||0}};
      if(inc.incidentType==='missedPenalty'||inc.incidentType==='miss')return{type:'Miss',detail:'Missed Penalty',team:{name:inc.team?.name||''},player:{name:inc.player?.name||''},time:{elapsed:inc.time||0}};
      return null;
    }).filter(Boolean);
    return{home:ev.homeTeam.name,away:ev.awayTeam.name,homeGoals:ev.homeScore?.current??'-',awayGoals:ev.awayScore?.current??'-',status,elapsed:ev.time?.played||null,events,halftime:ev.homeScore?.period1!==undefined?{home:ev.homeScore.period1??0,away:ev.awayScore.period1??0}:null};
  }catch(e){ document.getElementById('sync-label').textContent='Feil: '+e.message; return null; }
}

async function fetchESPN(league, eventId){
  if(!league||!eventId)return null;
  try{
    const ctrl=new AbortController();
    const tId=setTimeout(()=>ctrl.abort(),8000);
    const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/summary?event=${eventId}`,{signal:ctrl.signal});
    clearTimeout(tId);
    if(!res.ok)return null;
    const d=await res.json();
    const comp=d.header?.competitions?.[0]; if(!comp)return null;
    const homeC=comp.competitors.find(c=>c.homeAway==='home')||comp.competitors[0];
    const awayC=comp.competitors.find(c=>c.homeAway==='away')||comp.competitors[1];
    const sn=comp.status?.type?.name||'';
    const statusMap={'STATUS_SCHEDULED':'NS','STATUS_FIRST_HALF':'1H','STATUS_HALFTIME':'HT','STATUS_SECOND_HALF':'2H','STATUS_EXTRA_TIME':'ET','STATUS_PENALTY':'P','STATUS_FINAL':'FT','STATUS_FINAL_PEN':'FT','STATUS_IN_PROGRESS':'1H'};
    const status=statusMap[sn]||'NS';
    const elapsed=parseInt(comp.status?.displayClock)||null;
    const homeGoals=parseInt(homeC.score)??'-';
    const awayGoals=parseInt(awayC.score)??'-';

    const events=(d.keyEvents||[]).map(ev=>{
      const tt=(ev.type?.type||'').toLowerCase();
      const text=ev.text||'';
      const min=Math.ceil((ev.clock?.value||0)/60)||parseInt(ev.clock?.displayValue)||0;
      // Extract player and team from text: "Goal! Team X, Team Y. PlayerName (TeamName) ..."
      const playerMatch=text.match(/\.\s+([^(]+?)\s+\(([^)]+)\)/);
      const player=playerMatch?playerMatch[1].trim():'';
      const team=playerMatch?playerMatch[2].trim():'';
      if(tt.includes('goal')){
        const detail=tt.includes('own')?'Own Goal':tt.includes('pen')?'Penalty':'Normal Goal';
        return{type:'Goal',detail,team:{name:team},player:{name:player},time:{elapsed:min}};
      }
      if(tt.includes('yellow'))return{type:'Card',detail:'Yellow Card',team:{name:team},player:{name:player},time:{elapsed:min}};
      if(tt.includes('red')&&!tt.includes('goal'))return{type:'Card',detail:'Red Card',team:{name:team},player:{name:player},time:{elapsed:min}};
      if(tt.includes('sub')){
        // Try to extract both player-out and player-in from substitution text
        const allNames=[...text.matchAll(/([A-Z][^.(,\n]{1,28}?)\s*\(([^)]{1,30})\)/g)].map(m=>m[1].trim());
        const out=allNames[0]||player||'';
        const playerIn=allNames[1]||'';
        return{type:'subst',player:{name:out},assist:playerIn?{name:playerIn}:null,team:{name:team},time:{elapsed:min}};
      }
      if(tt.includes('miss')||tt.includes('penalty-miss'))return{type:'Miss',detail:'Missed Penalty',team:{name:team},player:{name:player},time:{elapsed:min}};
      return null;
    }).filter(Boolean);

    // Halftime score: approximate from period line scores in boxscore if available
    let halftime=null;
    const lines=d.boxscore?.teams||[];
    if(lines.length&&['2H','HT','FT','ET','P'].includes(status)){
      const hLine=lines.find(t=>t.team?.id===homeC.team?.id);
      const aLine=lines.find(t=>t.team?.id===awayC.team?.id);
      const hP1=hLine?.statistics?.find(s=>s.name==='period1Scoring')?.displayValue;
      const aP1=aLine?.statistics?.find(s=>s.name==='period1Scoring')?.displayValue;
      if(hP1!==undefined)halftime={home:parseInt(hP1)??0,away:parseInt(aP1)??0};
    }
    return{home:homeC.team?.displayName||'',away:awayC.team?.displayName||'',homeGoals,awayGoals,status,elapsed,events,halftime};
  }catch(e){return null;}
}

// ─── MATCH CLOCK ───
function syncClock(mk, s){
  if(!['1H','2H','ET'].includes(s.status)) return;
  const newElapsed = s.elapsed || 0;
  const prev = matchClocks[mk];
  // Only reset the anchor when the elapsed minute actually changes.
  // If elapsed is unchanged, leave pollTime alone so the counter keeps ticking
  // smoothly between polls instead of resetting to :00 every 20 seconds.
  if(!prev || newElapsed !== prev.elapsed){
    matchClocks[mk] = { elapsed: newElapsed, pollTime: Date.now() };
  }
}
function getClockDisplay(mk){
  const s=liveScores[mk]; if(!s)return'';
  if(s.status==='NS')return'Ikke startet';
  if(s.status==='HT')return'HT';
  if(s.status==='FT')return'FT';
  const c=matchClocks[mk]; if(!c)return s.elapsed?`${s.elapsed}'`:'';
  const sec=Math.floor((Date.now()-c.pollTime)/1000);
  const total=c.elapsed*60+sec;
  const m=Math.floor(total/60);
  return`${m}'`;
}

    knownEventKeys[mk].add(k); return true;

  if(firstLoad){ seededMatches.add(mk); return []; } // seed silently, no banners on load
  return newEvs;
}

// Calculate live/final points for all tips of a match based on current score
function calcLivePoints(mk, score){
  const matchTips=Object.entries(tips).filter(([,t])=>t.matchKey===mk);
  if(!matchTips.length)return;
  const isFinal=score.status==='FT';
  const hg=typeof score.homeGoals==='number'?score.homeGoals:null;
  const ag=typeof score.awayGoals==='number'?score.awayGoals:null;
  if(hg===null||ag===null)return;

  const events=score.events||[];
  const totalGoals=hg+ag;

  // First scorer — from goal events
  const firstGoal=events.find(e=>e.type==='Goal');
  let actualFS=null; // null = no goal yet
  if(firstGoal){
    const homeTeam=MATCHES[mk]?.home||'';
    actualFS=firstGoal.team.name.toLowerCase().includes(homeTeam.toLowerCase().split(' ')[0])?'H':'A';
  }

  // First half goal — halftime score preferred, fall back to events
  let firstHalfGoal=false;
  if(score.halftime&&typeof score.halftime.home==='number'){
    firstHalfGoal=(score.halftime.home+score.halftime.away)>0;
  } else {
    firstHalfGoal=events.some(e=>e.type==='Goal'&&e.time?.elapsed<=45);
  }

  const matchPlayers=MATCH_PLAYER_BETS[mk]||[];
  const actualHub=hg>ag?'H':hg<ag?'B':'U';
  const actualDiff=hg-ag;

  const upd={};
  for(const[tid,t]of matchTips){
    // Ladder: only highest achieved level gives points
    const exactHit=t.homeGoals===hg&&t.awayGoals===ag;
    const diffHit=!exactHit&&(t.homeGoals-t.awayGoals)===actualDiff;
    const hubHit=!diffHit&&!exactHit&&t.hub===actualHub;
    let pts=exactHit?7:diffHit?5:hubHit?3:0;

    // Bonus: first scorer (1p) — 0-0 at FT = no points for anyone
    if(actualFS!==null){ if(t.firstScorer===actualFS)pts+=1; }
    // (if actualFS===null at FT it's 0-0 → no points, intentional)

    // Bonus: first half goal (1p) — 'Y' confirmed live, 'N' only at FT
    if(firstHalfGoal){ if(t.firstHalfGoal==='Y')pts+=1; }
    else if(isFinal){ if(t.firstHalfGoal==='N')pts+=1; }

    // Bonus: match-specific player scorers (1p each)
    for(const pb of matchPlayers){
      const scored=goalEvents(events).some(e=>pb.names.some(n=>e.player?.name?.toLowerCase().includes(n)));
      if(scored){ if(t[pb.field]==='Y')pts+=1; } else if(isFinal){ if(t[pb.field]==='N')pts+=1; }
    }

    upd[`tips/${tid}/livePoints`]=pts;
    if(isFinal&&!t.resolved){
      upd[`tips/${tid}/points`]=pts;
      upd[`tips/${tid}/resolved`]=true;
      upd[`players/${t.playerId}/tipPoints`]=(players[t.playerId]?.tipPoints||0)+pts-(t.livePoints||0);
    }
  }
  if(Object.keys(upd).length) update(ref(db),upd);
}

// Helper to get current effective points for a tip (live or resolved)
function getTipPoints(t){
  if(t.resolved)return t.points||0;
  return t.livePoints||0;
}

function makeDrumPicker(inputId, min=0, max=15){
  const ITEM_H=48, VISIBLE=5, PAD=Math.floor(VISIBLE/2);
  let value=parseInt(document.getElementById(inputId)?.value??min);
  if(isNaN(value))value=min;

  const wrap=document.createElement('div');
  wrap.style.cssText=`position:relative;width:68px;height:${ITEM_H*VISIBLE}px;overflow:hidden;touch-action:none;user-select:none;border-radius:12px;background:var(--bg3);border:1px solid var(--border2);cursor:ns-resize`;

  const inner=document.createElement('div');
  inner.style.cssText='will-change:transform;';

  const allItems=[];
  for(let i=0;i<PAD;i++){
    const el=document.createElement('div');
    el.style.cssText=`height:${ITEM_H}px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:var(--text3)`;
    inner.appendChild(el); allItems.push({el,val:null});
  }
  for(let v=min;v<=max;v++){
    const el=document.createElement('div');
    el.style.cssText=`height:${ITEM_H}px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:var(--text3)`;
    el.textContent=v;
    inner.appendChild(el); allItems.push({el,val:v});
  }
  for(let i=0;i<PAD;i++){
    const el=document.createElement('div');
    el.style.cssText=`height:${ITEM_H}px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:var(--text3)`;
    inner.appendChild(el); allItems.push({el,val:null});
  }
  wrap.appendChild(inner);

  // Fade overlays
  const topG=document.createElement('div');
  topG.style.cssText=`position:absolute;top:0;left:0;right:0;height:${ITEM_H*PAD}px;background:linear-gradient(to bottom,var(--bg3) 20%,transparent);pointer-events:none;z-index:2`;
  const botG=document.createElement('div');
  botG.style.cssText=`position:absolute;bottom:0;left:0;right:0;height:${ITEM_H*PAD}px;background:linear-gradient(to top,var(--bg3) 20%,transparent);pointer-events:none;z-index:2`;
  // Center selection band
  const band=document.createElement('div');
  band.style.cssText=`position:absolute;top:${ITEM_H*PAD}px;left:6px;right:6px;height:${ITEM_H}px;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);border-radius:6px;pointer-events:none;z-index:1`;
  wrap.appendChild(topG); wrap.appendChild(botG); wrap.appendChild(band);

  function getOffset(v){ return -((v-min)*ITEM_H); }
  function applyOffset(off,animate){
    inner.style.transition=animate?'transform 0.2s cubic-bezier(.25,.46,.45,.94)':'none';
    inner.style.transform=`translateY(${off}px)`;
  }
  function highlight(v){
    allItems.forEach(({el,val})=>{
      const sel=val===v;
      el.style.color=sel?'var(--text)':'var(--text3)';
      el.style.fontSize=sel?'26px':'19px';
    });
    const inp=document.getElementById(inputId);
    if(inp)inp.value=v;
  }

  let curOff=getOffset(value);
  applyOffset(curOff,false); highlight(value);

  let startY=0, startOff=0, dragging=false;

  wrap.addEventListener('pointerdown',e=>{
    dragging=true; startY=e.clientY; startOff=curOff;
    inner.style.transition='none';
    wrap.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  wrap.addEventListener('pointermove',e=>{
    if(!dragging)return;
    const dy=e.clientY-startY;
    const raw=startOff+dy;
    const lo=getOffset(max), hi=getOffset(min);
    // Elastic resistance at edges
    curOff=raw<lo?lo+(raw-lo)*0.25:raw>hi?hi+(raw-hi)*0.25:raw;
    inner.style.transform=`translateY(${curOff}px)`;
    highlight(Math.max(min,Math.min(max,Math.round(min+(-curOff/ITEM_H)))));
    e.preventDefault();
  });
  function release(){
    if(!dragging)return; dragging=false;
    value=Math.max(min,Math.min(max,Math.round(min+(-curOff/ITEM_H))));
    curOff=getOffset(value);
    applyOffset(curOff,true); highlight(value);
  }
  wrap.addEventListener('pointerup',release);
  wrap.addEventListener('pointercancel',release);
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    value=Math.max(min,Math.min(max,value+(e.deltaY>0?1:-1)));

    applyOffset(curOff,true); highlight(value);
  },{passive:false});

  return wrap;
}

function teamFlag(name){
  if(!name)return'';

function rebuildBetCatalogs(){
  BET_CATALOG={};
  for(const[mk,m]of Object.entries(MATCHES)){
    const catalog=generateBetCatalog(mk,m.home,m.away,m.homeKey,m.awayKey);
    const playerBets=(MATCH_PLAYER_BETS[mk]||[]).map(pb=>({
      id:`player-${pb.field}`,
      text:`${pb.label.replace('?','')} i kampen`,
      odds:pb.field==='haaland'?1.6:pb.field==='mbappe'?1.8:3.5,
      resolve:(s,ev,ht,fin)=>{
        const scored=goalEvents(ev).some(e=>pb.names.some(n=>e.player?.name?.toLowerCase().includes(n)));
        return scored?true:fin?false:null;
      }
    }));
    if(playerBets.length) catalog.categories.push({icon:'⭐',label:'Spillere',bets:playerBets});
    BET_CATALOG[mk]=catalog;
  }
}

// ─── RESOLVER HELPERS ───
function goalEvents(ev){ return ev.filter(e=>e.type==='Goal'&&e.detail!=='Missed Penalty'); }
function playerScored(ev,...names){ const g=goalEvents(ev); return g.some(e=>names.some(n=>e.player?.name?.toLowerCase().includes(n.toLowerCase())))||null; }
function playerGoalCount(ev,name,min,fin){ const c=goalEvents(ev).filter(e=>e.player?.name?.toLowerCase().includes(name.toLowerCase())).length; if(c>=min)return true; return fin?false:null; }
function playerHattrick(ev,name,fin){ return playerGoalCount(ev,name,3,fin); }
function firstScorerTeam(ev,teamKey,fin){ const g=goalEvents(ev); if(!g.length)return fin?false:null; return g[0].team?.name?.toLowerCase().includes(teamKey)||null; }
function firstScorerPlayer(ev,name,fin){ const g=goalEvents(ev); if(!g.length)return fin?false:null; return g[0].player?.name?.toLowerCase().includes(name.toLowerCase())||null; }
function goalBefore(ev,min,fin){ if(goalEvents(ev).some(e=>e.time?.elapsed<min))return true; return fin?false:null; }
function overGoals(s,line,fin){ const tot=(s.homeGoals||0)+(s.awayGoals||0); if(tot>line)return true; return fin?false:null; }
function bothTeamsScored(s,fin){ if((s.homeGoals||0)>0&&(s.awayGoals||0)>0)return true; return fin?false:null; }
function teamScored(s,ev,teamKey,fin){ if((teamKey==='iraq'||teamKey==='senegal')?(s.awayGoals||0)>0:(s.homeGoals||0)>0)return true; return fin?false:null; }
function hasCard(ev,type,fin){ if(ev.some(e=>e.type==='Card'&&e.detail===type))return true; return fin?false:null; }
function overCards(ev,type,count,fin){ const c=ev.filter(e=>e.type==='Card'&&e.detail===type).length; if(c>count)return true; return fin?false:null; }
function hasPenalty(ev,fin){ if(ev.some(e=>e.type==='Goal'&&e.detail==='Penalty'||e.type==='Miss'))return true; return fin?false:null; }
function penaltyScored(ev,fin){ if(ev.some(e=>e.type==='Goal'&&e.detail==='Penalty'))return true; return fin?false:null; }
function penaltyMissed(ev,fin){ if(ev.some(e=>e.type==='Miss'&&e.detail==='Missed Penalty'))return true; return fin?false:null; }
function playerCard(ev,name,type,fin){ if(ev.some(e=>e.type==='Card'&&e.detail===type&&e.player?.name?.toLowerCase().includes(name.toLowerCase())))return true; return fin?false:null; }
function hasOwnGoal(ev,fin){ if(ev.some(e=>e.type==='Goal'&&e.detail==='Own Goal'))return true; return fin?false:null; }
function playerAssist(ev,name,fin){ if(ev.some(e=>e.type==='Goal'&&e.assist?.name?.toLowerCase().includes(name.toLowerCase())))return true; return fin?false:null; }
function playerSubbedOff(ev,name,fin){ if(ev.some(e=>e.type==='subst'&&e.player?.name?.toLowerCase().includes(name.toLowerCase())))return true; return fin?false:null; }
function countSubs(ev){ return ev.filter(e=>e.type==='subst').length; }

// ─── FLAT BET LOOKUP ───
function getBetDef(mk, betId){
  for(const cat of BET_CATALOG[mk]?.categories||[]){ const b=cat.bets.find(x=>x.id===betId); if(b)return b; }
  return null;
}

// ─── AUTO-RESOLVE BETS FROM LIVE DATA ───
let alreadyCelebrated = new Set();
let pendingWinCelebrations = []; // collected across autoResolveBets + resolveParlays each cycle

function autoResolveBets(mk, score){
  const openBets = Object.entries(bets).filter(([,b])=>b.matchKey===mk&&b.status==='open');
  if(!openBets.length)return;
  const ev = score.events||[];
  const isFin = score.status==='FT';
  const ht = score.halftime; // {home, away} or null
  const s = { homeGoals: score.homeGoals, awayGoals: score.awayGoals };

  const upd={};
  const wins=[];

  for(const[id,bet]of openBets){
    const def = getBetDef(mk, bet.betId);
    if(!def?.resolve)continue;
    let result;
    try{ result = def.resolve(s, ev, ht, isFin); }catch(e){ result=null; }
    if(result===true){
      upd[`bets/${id}/status`]='won';
      wins.push({id, bet});
    } else if(result===false){
      upd[`bets/${id}/status`]='lost';
    }
  }

  // When match is final, close out any bets that couldn't be resolved (unknown betId, null resolver, etc.)
  if(isFin){
    for(const[id]of openBets){
      if(!upd[`bets/${id}/status`])upd[`bets/${id}/status`]='lost';
    }
  }

  if(Object.keys(upd).length) update(ref(db), upd);

  // Queue new wins — celebration fired once at end of refreshLive cycle
  const newWins=wins.filter(({id})=>!alreadyCelebrated.has(id));
  newWins.forEach(({id})=>{alreadyCelebrated.add(id);pendingWinCelebrations.push({id,bet:bets[id]??{}}); });
}

// ─── CELEBRATION ───
function triggerCelebration(bets){
  if(!Array.isArray(bets))bets=[bets];
  const el=document.getElementById('celebration');
  const multi=bets.length>1;
  const first=bets[0];
  const hasGoal=bets.some(b=>b.desc?.toLowerCase().includes('scorer')||b.desc?.toLowerCase().includes('mål')||b.desc?.toLowerCase().includes('hattrick'));
  const emoji=multi?'🎉':hasGoal?'⚽':first.desc?.includes('kort')?'🟨':first.desc?.includes('straffe')?'🎯':'🎉';
  const title=multi?`${bets.length} TREFF!`:hasGoal?'MÅÅÅL!':'TREFFER!';
  const placers=[...new Set(bets.map(b=>b.placerName))].join(' & ');
  const totalPayout=bets.reduce((s,b)=>s+(b.payout||0),0);
  document.getElementById('celeb-emoji').textContent=emoji;
  document.getElementById('celeb-title').textContent=title;
  document.getElementById('celeb-desc').innerHTML=multi
    ?bets.map(b=>`<span style="font-size:16px;display:block;margin:2px 0">${b.placerName}: ${b.desc}</span>`).join('')
    :first.desc;
  document.getElementById('celeb-placer').textContent=`${placers} vinner!`;
  document.getElementById('celeb-payout').textContent=multi
    ?`🏆 Totalt ${totalPayout} tokens vunnet!`
    :`🏆 ${first.payout} tokens vunnet!`;
  spawnConfetti();
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),6000);
}

function spawnConfetti(){
  const el=document.getElementById('celebration');
  const colors=['#1D9E75','#EF9F27','#E24B4A','#4A90D9','#fff','#c9a227'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.cssText=`left:${Math.random()*100}%;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1}s`;
    el.appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
}

// ─── LIVE ODDS ENGINE ───
function calcLiveOdds(bet, mk){
  const s=liveScores[mk];
  if(!s||s.status==='NS')return{odds:bet.odds,changed:false};
  const hg=typeof s.homeGoals==='number'?s.homeGoals:0;
  const ag=typeof s.awayGoals==='number'?s.awayGoals:0;
  const total=hg+ag; const elapsed=s.elapsed||0; const id=bet.id;
  const adj=(mult)=>({odds:Math.max(1.05,parseFloat((bet.odds*mult).toFixed(2))),changed:true,dir:mult<1?'down':'up'});
  const same=()=>({odds:bet.odds,changed:false});

  // Over X.5 goals — lower odds as goals pile up
  const OVER={'o15':1.5,'o25':2.5,'o35':3.5,'o45':4.5};
  if(OVER[id]!==undefined){
    const needed=OVER[id]-total;
    if(needed<=0.5)return adj(0.15);
    if(needed<=1.5)return adj(0.5);
    if(needed<=2.5)return adj(0.75);
    return same();
  }

  // BTTS — one team scored, now just need the other
  if(id==='btts'){
    if((hg>0&&ag===0)||(ag>0&&hg===0))return adj(0.4);
    return same();
  }

  // Clean sheet — gets easier the longer 0 holds
  if(id==='clean-h'||id==='clean-a'){
    if(elapsed>75)return adj(0.4);
    if(elapsed>60)return adj(0.6);
    if(elapsed>45)return adj(0.75);
    return same();
  }

  // First 15 min goal — gets harder the closer to 15 with no goal
  if(id==='fg-15'||id==='ni-fg-15'){
    if(total===0&&elapsed>10)return adj(1.5+elapsed*0.05);
    if(total>0)return adj(0.2);
    return same();
  }

  // Half-time goals — time pressure in 1H
  if(id==='h1-goal'&&s.status==='1H'){
    if(total>0)return adj(0.25);
    if(elapsed>35)return adj(2.0);
    if(elapsed>25)return adj(1.4);
    return same();
  }

  // No goal 1H — gets harder if 0-0 and time passing
  if(id==='h1-nogoal'&&s.status==='1H'){
    if(total>0)return adj(8); // basically lost
    if(elapsed>35)return adj(0.4);
    if(elapsed>25)return adj(0.65);
    return same();
  }

  return same();
}

window.renderBetCatalog = function(){
  const mk = selectedBetMatch;
  const el = document.getElementById('bet-catalog');
  if(!mk){ el.innerHTML=''; return; }
  const score=liveScores[mk];
  if(score&&score.status!=='NS'){
    const done=score.status==='FT';
    el.innerHTML=`<div class="card" style="border-color:${done?'var(--green)':'var(--red)'}">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">${done?'✅':'🔒'}</span>
        <div style="flex:1"><div style="font-weight:600">${done?'Kamp ferdig':'Kampen er i gang – Bookern stengt!'}</div>
        <div style="font-size:12px;color:var(--text2)">Ingen nye bets kan plasseres</div></div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px">${score.homeGoals} – ${score.awayGoals}</div>
      </div></div>`;
    return;
  }
  const catalog = BET_CATALOG[mk]; if(!catalog){ el.innerHTML='<div class="empty">Ingen bets tilgjengelig</div>'; return; }
  // Group open bets by betId to show all placers (multiple allowed)
  const placersByBetId={};
  Object.values(bets).filter(b=>b.matchKey===mk&&b.status==='open').forEach(b=>{
    if(!placersByBetId[b.betId])placersByBetId[b.betId]=[];
    placersByBetId[b.betId].push(b.placerName);
  });
  const wonIds=new Set(Object.values(bets).filter(b=>b.matchKey===mk&&b.status==='won').map(b=>b.betId));
  const lostIds=new Set(Object.values(bets).filter(b=>b.matchKey===mk&&b.status==='lost').map(b=>b.betId));

  const parlayToggle=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button class="btn btn-sm${parlayMode?' btn-primary':''}" onclick="toggleParlayMode()">
      🔗 ${parlayMode?`Avslutt parlay (${parlayLegs.length} ben)`:'Kombiner → Parlay'}
    </button>
  </div>`;

  el.innerHTML = parlayToggle + catalog.categories.map(cat=>{
    const items=cat.bets.map(b=>{
      if(wonIds.has(b.id)||lostIds.has(b.id))return'';
      const placers=placersByBetId[b.id]||[];
      const live=calcLiveOdds(b,mk);
      const oddsDisplay=live.odds;
      const oddsTag=live.changed
        ?`<span class="odds-badge" style="background:${live.dir==='down'?'var(--green-light)':'var(--red-light)'}; color:${live.dir==='down'?'var(--green)':'var(--red)'}">${oddsDisplay}× ${live.dir==='down'?'↓':'↑'}</span>`
        :`<span class="odds-badge">${oddsDisplay}×</span>`;
      const tag=placers.length?`<span style="color:var(--green);font-size:12px">✓ ${placers.join(', ')}</span>`:'';
      const inParlay=parlayLegs.some(l=>l.matchKey===mk&&l.betId===b.id);
      const parlayCheck=parlayMode?`<span style="font-size:18px;margin-right:6px;flex-shrink:0">${inParlay?'✅':'⬜'}</span>`:'';
      return`<div class="bet-item${(placers.length||inParlay)?' already-placed':''}" onclick="${parlayMode?`addToParlay('${mk}','${b.id}')`:`selectBet('${mk}','${b.id}')`}">
        ${parlayCheck}<div class="bet-item-text">${b.text} ${tag}</div>
        <div class="bet-item-odds">${oddsTag}</div>
      </div>`;
    }).join('');
    if(!items.trim())return'';

// Resolve all open parlays — called each refresh cycle
function resolveParlays(){
  const openParlays=Object.entries(bets).filter(([,b])=>b.isParlay&&b.status==='open'&&b.legs);
  if(!openParlays.length)return;
  const upd={};
  const wins=[];
  for(const[id,bet]of openParlays){
    let allWon=true, anyLost=false;
    for(const leg of bet.legs){
      const def=getBetDef(leg.matchKey,leg.betId);
      const score=liveScores[leg.matchKey];
      if(!score||score.status==='NS'){allWon=false;continue;}
      const isFin=score.status==='FT';
      const s={homeGoals:score.homeGoals,awayGoals:score.awayGoals};
      const ev=score.events||[];
      const ht=score.halftime;
      if(!def?.resolve){if(isFin){anyLost=true;break;}allWon=false;continue;}
      let result;
      try{result=def.resolve(s,ev,ht,isFin);}catch(e){result=null;}
      if(result===false){anyLost=true;break;}
      if(result!==true)allWon=false;
    }
    if(anyLost)upd[`bets/${id}/status`]='lost';
    else if(allWon){upd[`bets/${id}/status`]='won';wins.push({id,bet});}
  }
  if(Object.keys(upd).length)update(ref(db),upd);
  // Queue — fired combined at end of refreshLive
  wins.filter(({id})=>!alreadyCelebrated.has(id)).forEach(({id,bet})=>{alreadyCelebrated.add(id);pendingWinCelebrations.push({id,bet});});
}

function getLiveTipPoints(playerId){

function getSorted(){
  return Object.entries(players).sort((a,b)=>{
    const ta=(getLiveTipPoints(b[0]))+(b[1].sipScore||0);
    const tb=(getLiveTipPoints(a[0]))+(a[1].sipScore||0);
    return ta-tb;
  });
}

window.showBreakdown=function(playerId){
  const p=players[playerId]; if(!p)return;
  const playerTips=Object.values(tips).filter(t=>t.playerId===playerId);
  const sip=p.sipScore||0;
  const tip=getLiveTipPoints(playerId);
  const tot=tip+sip;

  let rows='';

  // Per match breakdown
  for(const t of playerTips){
    const mk=t.matchKey;
    const score=liveScores[mk];
    const isLive=score&&['1H','HT','2H','ET','P'].includes(score.status);
    const isFT=score&&score.status==='FT';
    const hg=score&&typeof score.homeGoals==='number'?score.homeGoals:null;
    const ag=score&&typeof score.awayGoals==='number'?score.awayGoals:null;

    rows+=`<div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">${MATCHES[mk]?.label||mk} ${isLive?'🔴':isFT?'✅':'⏳'}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Tippet: ${MATCHES[mk]?.home||'H'} ${t.homeGoals}–${t.awayGoals} ${MATCHES[mk]?.away||'A'} (${t.hub})</div>`;

    if(hg!==null){
      const exactHit=t.homeGoals===hg&&t.awayGoals===ag;
      const diffHit=!exactHit&&(t.homeGoals-t.awayGoals)===(hg-ag);
      const hubHit=!diffHit&&!exactHit&&(hg>ag?'H':hg<ag?'B':'U')===t.hub;
      const mainPts=exactHit?7:diffHit?5:hubHit?3:0;
      const mainLabel=exactHit?'Eksakt stilling':diffHit?'Riktig målforskjell':hubHit?'Riktig HUB':'Ingen treff';
      rows+=breakdown(mainLabel, mainPts, 7, mainPts>0?true:(isLive||isFT)?false:null);
    } else {
      rows+=breakdown('Stilling', '?', 7, null);
    }

    // Bonus questions
    const evs=score?.events||[];
    const firstGoal=evs.find(e=>e.type==='Goal');
    let actualFS=null;
    if(firstGoal){ const home=MATCHES[mk]?.home||''; actualFS=firstGoal.team.name.toLowerCase().includes(home.toLowerCase().split(' ')[0])?'H':'A'; }
    let fhg=false;
    if(score?.halftime&&typeof score.halftime.home==='number'){ fhg=(score.halftime.home+score.halftime.away)>0; }
    else{ fhg=evs.some(e=>e.type==='Goal'&&e.time?.elapsed<=45); }
    // Player scorer bonuses
    function playerScoredBreakdown(label, field, scored){
      if(scored){ rows+=breakdown(label, t[field]==='Y'?1:0, 1, t[field]==='Y'); }
      else if(isFT){ rows+=breakdown(label, t[field]==='N'?1:0, 1, t[field]==='N'); }
      else{ rows+=breakdown(label, '?', 1, null); }
    }
    // Scorer
    if(actualFS!==null){ rows+=breakdown('⚽ Første scorer', t.firstScorer===actualFS?1:0, 1, t.firstScorer===actualFS); }
    else if(isFT){ rows+=breakdown('⚽ Første scorer (0–0)', 0, 1, false); }
    else{ rows+=breakdown('⚽ Første scorer', '?', 1, null); }

    // First half goal
    if(fhg||isFT){ const hit=(t.firstHalfGoal==='Y')===fhg; rows+=breakdown('⏱️ Mål i 1. omgang', hit?1:0, 1, hit); }
    else{ rows+=breakdown('⏱️ Mål i 1. omgang', '?', 1, null); }

    // Match-specific player scorers
    (MATCH_PLAYER_BETS[mk]||[]).forEach(pb=>{
      const scored=goalEvents(evs).some(e=>pb.names.some(n=>e.player?.name?.toLowerCase().includes(n)));
      playerScoredBreakdown(`🔵 ${pb.label}`, pb.field, scored);
    });

    rows+=`<div class="breakdown-row" style="margin-top:4px;border-top:1px solid var(--border2);padding-top:8px">
      <span style="font-size:14px;font-weight:600;color:var(--text)">Tipping totalt</span>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amber)">${getTipPoints(t)}p</span>
    </div></div>`;
  }

  // Slurker
  rows+=`<div class="breakdown-row">
    <span class="breakdown-label">🃏 Bookern (netto tokens)</span>
    <span class="breakdown-pts ${sip>=0?'hit':'miss'}">${sip>=0?'+':''}${sip} token${Math.abs(sip)!==1?'s':''}</span>
  </div>`;

  // Total
  rows+=`<div class="breakdown-row" style="margin-top:4px">
    <span style="font-size:16px;font-weight:600;color:var(--text)">TOTALT</span>
    <span style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:${tot>=0?'var(--green)':'var(--red)'}">${tot>0?'+':''}${tot}p</span>
  </div>`;

  document.getElementById('modal-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem">
      ${avatarEl(p,playerId)}
      <div><div style="font-size:18px;font-weight:600">${p.name}</div><div style="font-size:13px;color:var(--text2)">Poengdetaljer</div></div>
    </div>${rows}`;
  document.getElementById('modal-overlay').style.display='flex';
};

function breakdown(label, pts, max, hit){
  const cls=hit===null?'pending':hit?'hit':'miss';
  const icon=hit===null?'⏳':hit?'✅':'❌';
  return`<div class="breakdown-row">
    <span class="breakdown-label">${icon} ${label}</span>
    <span class="breakdown-pts ${cls}">${pts===0||pts==='?'?pts:'+'+pts}/${max}p</span>
  </div>`;
}

  const el=document.getElementById('tv-scoreboard'); if(!el)return;
  const list=getSorted();
  if(!list.length){ el.innerHTML='<div style="color:var(--text3)">Ingen spillere</div>'; return; }
  el.innerHTML=list.map(([id,p],i)=>{
    const tip=getLiveTipPoints(id); const sip=p.sipScore||0; const tot=tip+sip;
    return`<div class="tv-score-row" onclick="showBreakdown('${id}')" style="cursor:pointer">
      <div class="tv-rank">${['🥇','🥈','🥉'][i]||(i+1)}</div>
      ${avatarEl(p,id)}
      <div class="tv-name" style="margin-left:10px">${p.name}</div>
      <div style="text-align:right">
        <div class="tv-val ${tot>=0?'pos':'neg'}">${tot>0?'+':''}${tot}</div>
        <div style="font-size:11px;color:var(--text2)">🎯${tip} · 🍺${sip>=0?'+':''}${sip}</div>
      </div>
    </div>`;}).join('');
}

function renderTVLive(){
  const el=document.getElementById('tv-live'); if(!el)return;
  const entries=Object.entries(liveScores).filter(([,s])=>s.status!=='NS');
  if(!entries.length){ el.innerHTML='<div style="color:var(--text3);font-size:14px">Ingen kamp i gang</div>'; return; }
  el.innerHTML=entries.map(([mk,s],i)=>{
    const m=MATCHES[mk];
    const isLive=['1H','HT','2H','ET','P'].includes(s.status);
    const isFT=s.status==='FT';
    const clock=getClockDisplay(mk);
    const sep=i>0?'border-top:1px solid var(--border);margin-top:16px;padding-top:16px':'';
    const importantEvs=[...(s.events||[])].reverse().filter(e=>e.type==='Goal'||e.type==='Card'||e.type==='Miss'||e.type==='subst').slice(0,5);
    return`<div style="${sep}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;color:var(--text2)">${m?.label||mk}</span>
        <span>${isLive?'<span class="live-badge">LIVE</span>':isFT?'<span style="color:var(--green);font-size:12px;font-weight:600">✅ FT</span>':''}</span>
      </div>
      <div class="tv-live-score">${s.homeGoals} – ${s.awayGoals}</div>
      <div style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:32px;color:${isLive?'var(--green)':isFT?'var(--text2)':'var(--text3)'};letter-spacing:1px;margin:4px 0">${clock}</div>
      ${importantEvs.length?`<div class="tv-event-feed">${importantEvs.map(e=>{
        const icon=e.type==='Goal'?(e.detail==='Own Goal'?'🔄':e.detail==='Penalty'?'⚽🅿️':'⚽'):e.type==='Miss'?'❌':e.type==='Card'?(e.detail==='Red Card'?'🟥':'🟨'):e.type==='subst'?'🔄':'❓';
        const playerOut=e.player?.name||'';
        const playerIn=e.assist?.name||'';
        const label=e.type==='subst'
          ?(playerOut&&playerIn?`${playerOut} → ${playerIn}`:playerOut||playerIn||'Bytte')
          :(e.player?.name||'');
        const isSubst=e.type==='subst';
        return`<div style="display:flex;align-items:center;gap:8px;font-size:13px;opacity:${isSubst?'0.65':'1'}">
          <span>${icon}</span>
          <span style="color:var(--text2);font-size:11px;min-width:24px">${e.time?.elapsed||''}'</span>
          <span style="font-weight:${isSubst?'400':'500'}">${label}</span>
          <span style="color:var(--text3);font-size:11px">${isSubst?'':e.team?.name||''}</span>
        </div>`;}).join('')}</div>`:''}
    </div>`;
  }).join('');
}

function renderTVSlurkebet(){
  const stage = document.getElementById('slurkebet-podium-stage'); if(!stage)return;
  const list = Object.entries(players).map(([id,p])=>{
    return [id, p, getTokensWon(id), getTokensSpent(id)];
  }).sort((a,b)=>b[2]-a[2]);

  const spots=[{rank:2,spot:'spot-2',idx:1},{rank:1,spot:'spot-1',idx:0},{rank:3,spot:'spot-3',idx:2}];
  stage.innerHTML=spots.map(({rank,spot,idx})=>{
    const entry=list[idx];
    if(!entry)return`<div class="podium-spot ${spot}"><div style="height:80px"></div><div class="podium-block"><span class="podium-num">${rank}</span></div></div>`;
    const [id,p,won,spent]=entry;
    return`<div class="podium-spot ${spot}">
      ${miiHTML(p,id,spot)}
      <div class="mii-label">${p.name}</div>
      <div class="mii-pts">🎯 +${won} tokens</div>
      <div style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:4px">${TOKEN_BUDGET-spent} av ${TOKEN_BUDGET} igjen</div>
      <div class="podium-block"><span class="podium-num">${rank}</span></div>
    </div>`;
  }).join('');
}

function getParlayLegStatus(leg){
  const def=getBetDef(leg.matchKey,leg.betId);
  const score=liveScores[leg.matchKey];
  if(!score||score.status==='NS')return'pending';
  const isFin=score.status==='FT';
  const s={homeGoals:score.homeGoals,awayGoals:score.awayGoals};
  const ev=score.events||[];
  const ht=score.halftime;
  if(!def?.resolve)return isFin?'lost':'pending';
  let r; try{r=def.resolve(s,ev,ht,isFin);}catch(e){r=null;}
  return r===true?'won':r===false?'lost':'pending';
}

function renderTVBets(){
  const el=document.getElementById('tv-bets-right-content'); if(!el)return;
  const playerOrder=getSorted().map(([id])=>id);
  const byPlayer={};
  Object.entries(bets).forEach(([,b])=>{
    if(b.status==='lost')return;
    if(!byPlayer[b.placerId])byPlayer[b.placerId]={name:b.placerName,bets:[]};
    byPlayer[b.placerId].bets.push(b);
  });
  const sorted=playerOrder.filter(id=>byPlayer[id]);
  if(!sorted.length){ el.innerHTML='<div style="color:var(--text3);font-size:13px">Ingen bets ennå</div>'; return; }
  el.innerHTML=sorted.map(pid=>{
    const grp=byPlayer[pid]; if(!grp)return'';
    const p=players[pid];
    return`<div class="tv-bet-player">
      <div class="tv-bet-player-name">${avatarEl(p,pid)} ${grp.name}</div>
      ${grp.bets.map(b=>{
        const won=b.status==='won';
        const legRows=b.isParlay&&b.legs
          ?b.legs.map(l=>{
              const st=getParlayLegStatus(l);
              const col=st==='won'?'var(--green)':st==='lost'?'var(--red)':'var(--text3)';
              const icon=st==='won'?'✅':st==='lost'?'❌':'⏳';
              return`<div style="font-size:11px;color:${col};margin-bottom:2px">${icon} ${l.desc} <span style="color:var(--text3)">(${l.odds}×)</span></div>`;
            }).join('')
          :'';
        return`<div class="tv-bet-row${won?' won':''}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <span style="font-size:10px;color:var(--text2)">${b.isParlay?'🔗 Parlay':b.matchLabel||''}</span>
            <span style="font-size:12px;font-weight:700;color:${won?'var(--green)':'var(--amber)'}">${b.odds}×${won?' 🎉':''}</span>
          </div>
          ${legRows||`<div style="font-size:12px;font-weight:500;margin-bottom:2px">${b.desc}</div>`}
          <div style="font-size:11px;color:var(--text2)">🎯${b.stake} → 🏆${b.payout}${won?` <strong style="color:var(--green)">TREFF!</strong>`:''}</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function renderTVTips(){
  const el=document.getElementById('tv-tips'); if(!el)return;
  const matchKeys=Object.keys(MATCHES);
  if(!matchKeys.length){ el.innerHTML='<div style="color:var(--text3);font-size:13px">Ingen kamper lagt til</div>'; return; }

  el.innerHTML=matchKeys.map((mk,mi)=>{
    const match=MATCHES[mk];
    const score=liveScores[mk];
    const isLive=score&&['1H','HT','2H','ET','P'].includes(score.status);
    const isFT=score&&score.status==='FT';
    const hasScore=score&&score.status!=='NS'&&typeof score.homeGoals==='number';
    const actualHub=hasScore?(score.homeGoals>score.awayGoals?'H':score.homeGoals<score.awayGoals?'B':'U'):null;
    const actualDiff=hasScore?score.homeGoals-score.awayGoals:null;

    // Bonus ground truth — computed live where possible
    let actualFS=null, actualFHG=null;
    const playerActuals={};
    if(hasScore){
      const evs=score.events||[];
      const firstGoal=evs.find(e=>e.type==='Goal');
      if(firstGoal){ const home=match.home||''; actualFS=firstGoal.team.name.toLowerCase().includes(home.toLowerCase().split(' ')[0])?'H':'A'; }
      if(score.halftime&&typeof score.halftime.home==='number'){ actualFHG=(score.halftime.home+score.halftime.away)>0; }
      else{ actualFHG=evs.some(e=>e.type==='Goal'&&e.time?.elapsed<=45); }
      const goals=goalEvents(evs);
      (MATCH_PLAYER_BETS[mk]||[]).forEach(pb=>{
        playerActuals[pb.field]=goals.some(e=>pb.names.some(n=>e.player?.name?.toLowerCase().includes(n)));
      });
    }

    const playerList=getSorted();
    const rows=playerList.map(([pid,p])=>{
      const tip=Object.values(tips).find(t=>t.playerId===pid&&t.matchKey===mk);
      if(!tip) return '';

      const pts=getTipPoints(tip);
      const hubAbbr=tip.hub==='H'?getTeamAbbr(match.home):tip.hub==='B'?getTeamAbbr(match.away):'U';
      const hubColor=tip.hub==='H'?'var(--blue)':tip.hub==='B'?'var(--amber)':'var(--text2)';
      const hubHit=actualHub!==null?tip.hub===actualHub:null;
      const diffHit=actualDiff!==null?(tip.homeGoals-tip.awayGoals)===actualDiff:null;
      const exactHit=hasScore?tip.homeGoals===score.homeGoals&&tip.awayGoals===score.awayGoals:null;
      const ind=h=>h===null?'<span style="font-size:12px;color:var(--text3)">·</span>':h?'<span style="font-size:12px">✅</span>':'<span style="font-size:12px">❌</span>';

      const fsHit=actualFS!==null?tip.firstScorer===actualFS:(isFT?false:null);
      const fhgHit=actualFHG===null?null:actualFHG?(tip.firstHalfGoal==='Y'):(isFT?tip.firstHalfGoal==='N':null);
      const pHit=(actual,field)=>actual===null?null:actual?(tip[field]==='Y'):(isFT?tip[field]==='N':null);
      const playerBonusHtml=(MATCH_PLAYER_BETS[mk]||[]).map(pb=>{
        const hit=pHit(pb.field in playerActuals?playerActuals[pb.field]:null, pb.field);
        return`<span>🔵 ${pb.abbr} <strong style="color:${bonusCol(hit)}">${tip[pb.field]==='Y'?'Ja':'Nei'}</strong>${bonusInd(hit)}</span>`;
      }).join('');
      const bonusInd=h=>h===null?'':h?' ✅':' ❌';
      const bonusCol=h=>h===true?'var(--green)':h===false?'var(--red)':'var(--text)';

      const scorerLabel=tip.firstScorer==='H'?getTeamAbbr(match.home):tip.firstScorer==='A'?getTeamAbbr(match.away):'–';
      const ptsColor=pts>0?'var(--green)':pts===0&&(isLive||isFT)?'var(--red)':'var(--text3)';

      return`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
        ${avatarEl(p,pid)}
        <div style="flex:0 0 auto">
          <div style="font-size:13px;font-weight:600">${p.name}</div>
          <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
            <span style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px">${tip.homeGoals}–${tip.awayGoals}</span>
            <span style="font-size:10px;padding:1px 5px;border-radius:6px;background:${hubColor}22;color:${hubColor};font-weight:700">${hubAbbr}</span>
          </div>
        </div>
        <div style="display:flex;gap:2px;align-items:center;flex-shrink:0">${ind(hubHit)}${ind(diffHit)}${ind(exactHit)}</div>
        <div style="flex:1;display:flex;gap:10px;align-items:center;justify-content:center;font-size:12px;color:var(--text2);flex-wrap:wrap">
          <span>⚽ <strong style="color:${bonusCol(fsHit)}">${scorerLabel}</strong>${bonusInd(fsHit)}</span>
          <span>⏱️ <strong style="color:${bonusCol(fhgHit)}">${tip.firstHalfGoal==='Y'?'Ja':'Nei'}</strong>${bonusInd(fhgHit)}</span>
          ${playerBonusHtml}
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;min-width:36px;text-align:right;color:${ptsColor}">${pts}p</div>
      </div>`;
    }).join('');

    const sep=mi>0?'border-top:1px solid var(--border2);margin-top:14px;padding-top:14px':'';
    return`<div style="${sep}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text2)">${teamFlag(match.home)}${match.home} vs ${teamFlag(match.away)}${match.away}</div>
        <div style="display:flex;align-items:center;gap:6px">
          ${hasScore?`<span style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px">${score.homeGoals}–${score.awayGoals}</span>`:''}
          ${isLive?'<span class="live-badge">LIVE</span>':isFT?'<span style="color:var(--green);font-size:11px;font-weight:700">FT</span>':''}
        </div>
      </div>
      ${rows||'<div style="color:var(--text3);font-size:13px;padding:6px 0">Ingen tips enda</div>'}
    </div>`;
  }).join('');
}

let testEvents=[];

window.updateTestLabels=function(){
  const mk=document.getElementById('test-match').value;
  const m=MATCHES[mk]; if(!m)return;
  document.getElementById('test-home-lbl').textContent=m.home;
  document.getElementById('test-away-lbl').textContent=m.away;
  const btns=document.getElementById('test-event-btns'); if(!btns)return;
  btns.innerHTML=(TEST_EVENTS_BY_MATCH[mk]||[]).map((e,i)=>
    `<button class="btn btn-sm" onclick="addTestEvent(${i})">${e.label}</button>`
  ).join('')+`<button class="btn btn-sm btn-red" onclick="clearTestEvents()">✕ Reset events</button>`;
};
window.addTestEvent=function(i){
  const mk=document.getElementById('test-match').value;
  const elapsed=parseInt(document.getElementById('test-elapsed').value)||45;
  const def=TEST_EVENTS_BY_MATCH[mk]?.[i]; if(!def)return;
  testEvents.push({...def.ev, time:{elapsed}});
  renderTestEvents();
};
window.clearTestEvents=function(){ testEvents=[]; renderTestEvents(); };
function renderTestEvents(){
  const el=document.getElementById('test-events-display'); if(!el)return;
  el.textContent=testEvents.length?testEvents.map(e=>`${e.type==='Goal'?'⚽':'🟥'} ${e.player?.name||e.detail}`).join(' · '):'';
}
window.applyTestScore=function(){
  const mk=document.getElementById('test-match').value;
  const status=document.getElementById('test-status').value;
  const hg=parseInt(document.getElementById('test-hg').value)||0;
  const ag=parseInt(document.getElementById('test-ag').value)||0;
  const elapsed=parseInt(document.getElementById('test-elapsed').value)||0;
  const match=MATCHES[mk]; if(!match)return;
  const hasHalf=['HT','2H','FT'].includes(status);
  liveScores[mk]={ home:match.home, away:match.away, homeGoals:hg, awayGoals:ag,
    status, elapsed:status==='FT'?null:elapsed, events:[...testEvents],
    halftime:hasHalf?{home:hg,away:ag}:null };
  calcLivePoints(mk,liveScores[mk]);
  autoResolveBets(mk,liveScores[mk]);
  renderLiveBox(); renderScore();
  if(currentTab==='tv')renderTV();
  showToast(`Test: ${match.home} ${hg}–${ag} ${match.away} (${status})`);
};
window.clearTestScore=function(){
  const mk=document.getElementById('test-match').value;
  delete liveScores[mk]; testEvents=[];
  renderTestEvents(); renderLiveBox(); renderScore();
  if(currentTab==='tv')renderTV();
  showToast('Test score nullstilt');
};

// ─── DEVICE IP AUTO-SELECT ───
async function detectDevicePlayer(){
  try{
    const res=await fetch('https://api.ipify.org?format=json');
    const {ip}=await res.json();
    deviceIp=ip;
    const safeIp=ip.replace(/\./g,'_').replace(/:/g,'-');
    const snap=await new Promise(resolve=>onValue(ref(db,'ipmap/'+safeIp),resolve,{onlyOnce:true}));
    const pid=snap.val();
    if(pid&&players[pid]){
      devicePlayerId=pid;
      renderPlayerSelects();
      if(currentTab==='spillere')renderMyOverview();
    }
  }catch(e){}
}
async function saveDeviceMapping(pid){
  if(!deviceIp){
    try{ const r=await fetch('https://api.ipify.org?format=json'); deviceIp=(await r.json()).ip; }catch{ return; }
  }
  const safeIp=deviceIp.replace(/\./g,'_').replace(/:/g,'-');
  set(ref(db,'ipmap/'+safeIp),pid);
  devicePlayerId=pid;
  renderPlayerSelects();
}
detectDevicePlayer();

// ─── TOAST ───
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity='0',3000); }
window.showToast=showToast;
